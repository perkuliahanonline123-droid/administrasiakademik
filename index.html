<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#064e3b">
    <title>Sistem Kampus | Layanan Administrasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { 950: '#022c22', 900: '#064e3b', 800: '#065f46', 700: '#047857', 600: '#059669', 500: '#10b981', 100: '#d1fae5', 50: '#f0fdf4' } },
                    boxShadow: { 'timbul-lg': '0 30px 60px -15px rgba(2, 44, 34, 0.2), 0 25px 45px -20px rgba(5, 150, 105, 0.25)' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .bg-mesh { background-color: #064e3b; background-image: radial-gradient(at 0% 0%, #065f46 0px, transparent 50%), radial-gradient(at 100% 100%, #047857 0px, transparent 50%); }
        html { scroll-behavior: smooth; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 font-sans antialiased pb-24 md:pb-12">

    <div class="w-full max-w-5xl mx-auto">
        
        <header class="bg-mesh text-white px-5 pt-10 pb-16 md:p-14 rounded-b-[2rem] md:rounded-[2.5rem] md:mx-6 md:mt-8 shadow-timbul-lg relative overflow-hidden animate-fade-in">
            <div class="absolute top-0 right-0 w-48 h-48 md:w-64 md:h-64 bg-white/5 rounded-full blur-2xl -mr-10 -mt-10 md:-mr-20 md:-mt-20"></div>
            <div class="relative z-10 flex flex-col md:items-center md:text-center gap-1 md:gap-3">
                <span class="text-[10px] md:text-xs font-bold tracking-widest text-brand-100 uppercase bg-white/10 self-start md:self-center px-3 md:px-4 py-1 md:py-1.5 rounded-full border border-white/20 mb-2 md:mb-4">Portal Terpadu</span>
                <h1 class="font-serif text-3xl md:text-5xl font-bold leading-tight">Layanan Administrasi</h1>
                <p class="text-brand-100/90 text-sm md:text-base mt-1 md:max-w-xl">Akses cepat formulir permohonan akademik Anda secara online.</p>
            </div>
        </header>

        <main class="px-4 md:px-6 -mt-8 md:mt-8 relative z-10 space-y-5 md:space-y-8">
            
            <div class="bg-white rounded-2xl md:rounded-[2.5rem] shadow-sm md:shadow-lg md:border border-slate-100 md:border-slate-200/60 p-5 md:p-10 animate-fade-in" style="animation-delay: 0.1s;">
                <div class="flex items-center gap-3 md:gap-4 mb-4 md:mb-6 pb-3 md:pb-4 border-b border-slate-50 md:border-slate-100">
                    <div class="w-10 h-10 md:w-12 md:h-12 bg-brand-50 text-brand-600 rounded-xl md:rounded-2xl flex items-center justify-center"><i class="fas fa-concierge-bell text-lg md:text-xl"></i></div>
                    <div>
                        <h2 class="font-extrabold text-lg md:text-2xl text-slate-800 leading-none">Daftar Layanan</h2>
                        <p class="text-xs md:text-sm font-medium text-slate-500 mt-1">Pilih layanan untuk mengisi form permohonan</p>
                    </div>
                </div>

                <div id="loadingLayanan" class="text-center py-6 md:py-8">
                    <i class="fas fa-circle-notch fa-spin text-2xl md:text-3xl text-brand-500 mb-2 md:mb-3"></i>
                    <p class="text-slate-500 text-xs md:text-sm font-semibold">Memuat daftar layanan...</p>
                </div>

                <div id="gridLayanan" class="hidden flex flex-col md:grid md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-5"></div>

                <div class="hidden mt-6 md:mt-10 md:pt-8 md:border-t border-slate-100 md:flex md:justify-center" id="wadahTombolStatus">
                    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-md border-t border-slate-200 z-50 md:static md:w-auto md:p-0 md:bg-transparent md:border-none md:backdrop-blur-none">
                        <button onclick="bukaAreaPencarian()" class="group w-full md:w-auto relative flex items-center justify-center md:inline-flex gap-3 md:gap-5 px-6 md:px-8 py-3.5 md:py-4 bg-gradient-to-b from-brand-600 to-brand-800 text-white rounded-xl md:rounded-[1.25rem] font-bold md:shadow-lg shadow-brand-600/30 md:hover:-translate-y-1.5 transition-all duration-300">
                            <div class="relative w-8 h-8 md:w-12 md:h-12 bg-white/10 rounded-lg md:rounded-xl flex items-center justify-center border border-white/20"><i class="fas fa-clipboard-check text-base md:text-xl"></i></div>
                            <div class="flex flex-col text-left">
                                <span class="hidden md:block text-[10px] uppercase tracking-widest text-brand-100/80 mb-0.5">Sudah Mengajukan?</span>
                                <span class="text-base md:text-lg">Cek Status Pengajuan</span>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="areaPencarian" class="hidden md:mt-8 bg-slate-50 border border-slate-200 rounded-2xl md:rounded-[2rem] p-5 md:p-8 shadow-inner mt-4 scroll-mt-24">
                    <h3 class="font-bold text-base md:text-xl text-slate-800 mb-4 md:mb-5 flex items-center"><i class="fas fa-search text-brand-600 mr-2 md:mr-3"></i>Cari Berkas Anda</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 mb-4 md:mb-6">
                        <div class="flex flex-col">
                            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Jenis Layanan</label>
                            <select id="inputJenisLayanan" class="w-full bg-white border-2 border-slate-200 text-slate-700 py-3 md:py-3.5 px-4 rounded-xl text-sm md:text-base font-bold focus:border-brand-500 outline-none transition-all" onchange="prosesPencarian()">
                                <option value="">-- Pilih Layanan --</option>
                                <option value="Keterangan Aktif">Keterangan Aktif</option>
                                <option value="KHS">Kartu Hasil Studi (KHS)</option>
                                <option value="SKL">Surat Keterangan Lulus (SKL)</option>
                                <option value="Bebas Tanggungan">Surat Bebas Tanggungan</option>
                                <option value="Mutasi">Mutasi (Pindah Kampus)</option>
                            </select>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Nama Mahasiswa</label>
                            <input type="text" id="inputNamaMahasiswa" placeholder="Ketik minimal 3 huruf..." class="w-full bg-white border-2 border-slate-200 text-slate-700 py-3 md:py-3.5 px-4 rounded-xl text-sm md:text-base font-bold focus:border-brand-500 outline-none transition-all" oninput="prosesPencarian()">
                        </div>
                    </div>

                    <div id="loadingPencarian" class="hidden text-center py-6 md:py-8"><i class="fas fa-circle-notch fa-spin text-xl md:text-3xl text-brand-500 mb-2 md:mb-3"></i><p class="text-slate-500 text-xs md:text-sm">Mencari data...</p></div>
                    
                    <div id="wadahHasil" class="hidden mt-4">
                        <div id="isiHasil" class="flex flex-col gap-3 md:gap-0 md:divide-y divide-slate-100 bg-transparent md:bg-white md:border border-slate-200 md:rounded-xl md:overflow-hidden"></div>
                        <div id="pesanKosong" class="hidden p-6 md:p-8 text-center bg-slate-50 md:bg-white rounded-xl md:rounded-none text-slate-400 text-sm font-medium border border-slate-100 md:border-none">
                            <i class="fas fa-search-minus text-2xl md:text-3xl mb-2 md:mb-3 block text-slate-300"></i> Tidak ditemukan data yang cocok.
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxHkTkVUmc0abF2SllCisDkSuTNDj691YTxi2E7427ooASQd8IESztTwspR_VuH9_blg/exec';

        window.onload = async function() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLayanan`);
                const data = await response.json();
                tampilkanDaftarLayanan(data);
            } catch (error) {
                document.getElementById("loadingLayanan").innerHTML = `<div class="p-4 text-center text-rose-500 bg-rose-50 rounded-xl text-xs font-medium border border-rose-100">Gagal terhubung ke server.<br>Silakan muat ulang halaman.</div>`;
            }
        };

        function tampilkanDaftarLayanan(data) {
            document.getElementById("loadingLayanan").classList.add("hidden");
            const grid = document.getElementById("gridLayanan");
            grid.classList.remove("hidden");
            document.getElementById("wadahTombolStatus").classList.remove("hidden");

            if (!data || data.length === 0 || data.error) return grid.innerHTML = `<div class="p-4 text-center text-slate-500 text-sm bg-slate-50 rounded-xl">Belum ada layanan tersedia.</div>`;

            data.forEach((item, index) => {
                const a = document.createElement("a");
                a.href = item.link; a.target = "_blank";
                // Styling gabungan: List biasa di HP, Box Hover di Desktop
                a.className = `group animate-fade-in flex items-center justify-between md:justify-start gap-4 p-3.5 md:p-5 bg-slate-50 md:bg-white hover:bg-brand-50 border border-slate-100 md:border-slate-200/50 rounded-xl md:rounded-[1.25rem] transition-all duration-500 md:hover:-translate-y-1 md:hover:shadow-md`;
                a.style.animationDelay = `${index * 0.1}s`;
                a.innerHTML = `
                    <div class="flex items-center gap-3 md:gap-5">
                        <div class="w-10 h-10 md:w-14 md:h-14 bg-white md:bg-slate-50 rounded-lg md:rounded-[1rem] flex items-center justify-center text-brand-600 md:text-slate-400 border border-slate-100 md:border-transparent md:group-hover:bg-brand-600 md:group-hover:text-white transition-all shadow-sm md:shadow-none flex-shrink-0 z-10">
                            <i class="fas fa-file-alt md:hidden"></i>
                            <i class="fas fa-arrow-right -rotate-45 hidden md:block text-lg"></i>
                        </div>
                        <div class="flex flex-col justify-center z-10 pr-2">
                            <span class="font-bold text-sm md:text-[15px] text-slate-700 md:group-hover:text-brand-900 leading-tight">${item.nama}</span>
                            <span class="hidden md:block text-[11px] text-brand-600/80 font-bold mt-1 opacity-0 group-hover:opacity-100 transition-all duration-500">Buka Formulir &rarr;</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right md:hidden text-slate-300 text-xs"></i>
                `;
                grid.appendChild(a);
            });
        }

        function bukaAreaPencarian() {
            const area = document.getElementById("areaPencarian");
            area.classList.remove("hidden"); 
            area.classList.add("animate-fade-in");
            setTimeout(() => { area.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
        }

        let timerKetik;
        function prosesPencarian() {
            clearTimeout(timerKetik);
            let jenis = document.getElementById("inputJenisLayanan").value;
            let nama = document.getElementById("inputNamaMahasiswa").value.trim();
            
            if (jenis !== "" && nama.length >= 3) {
                document.getElementById("loadingPencarian").classList.remove("hidden");
                document.getElementById("wadahHasil").classList.add("hidden");
                timerKetik = setTimeout(async () => {
                    try {
                        const response = await fetch(`${SCRIPT_URL}?action=cariStatus&jenis=${encodeURIComponent(jenis)}&nama=${encodeURIComponent(nama)}`);
                        const data = await response.json();
                        tampilkanHasilPencarian(data);
                    } catch (error) { document.getElementById("loadingPencarian").classList.add("hidden"); }
                }, 600);
            } else {
                document.getElementById("loadingPencarian").classList.add("hidden");
                document.getElementById("wadahHasil").classList.add("hidden");
            }
        }

        function tampilkanHasilPencarian(data) {
            document.getElementById("loadingPencarian").classList.add("hidden");
            let wadahHasil = document.getElementById("wadahHasil");
            let isiHasil = document.getElementById("isiHasil");
            wadahHasil.classList.remove("hidden"); isiHasil.innerHTML = "";

            if (data && !data.error && data.length > 0) {
                document.getElementById("pesanKosong").classList.add("hidden");
                data.forEach(item => {
                    let r1 = item.rincian1 || "", r2 = item.rincian2 || "", r3 = item.rincian3 || "";
                    let cekWarna = (r1 + " " + r2 + " " + r3).toLowerCase();
                    
                    let wBadge = cekWarna.includes('ditolak') ? 'bg-rose-100 text-rose-700' : (cekWarna.includes('proses') || cekWarna.includes('belum') ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700');
                    let tBadge = cekWarna.includes('ditolak') ? 'Ditolak' : (cekWarna.includes('proses') || cekWarna.includes('belum') ? 'Diproses' : 'Selesai');
                    let iconBadge = cekWarna.includes('ditolak') ? 'fa-times' : (cekWarna.includes('proses') || cekWarna.includes('belum') ? 'fa-spinner fa-spin' : 'fa-check');

                    let rHtml = "";
                    if(item.rincian1) rHtml += `<div class="truncate md:whitespace-normal md:mb-1"><i class="fas fa-angle-right mr-1 text-slate-300 md:hidden"></i><i class="fas fa-caret-right hidden md:inline text-slate-400 mr-2"></i>${item.rincian1}</div>`;
                    if(item.rincian2) rHtml += `<div class="truncate md:whitespace-normal md:mb-1"><i class="fas fa-angle-right mr-1 text-slate-300 md:hidden"></i><i class="fas fa-caret-right hidden md:inline text-slate-400 mr-2"></i>${item.rincian2}</div>`;
                    if(item.rincian3) rHtml += `<div class="truncate md:whitespace-normal"><i class="fas fa-angle-right mr-1 text-slate-300 md:hidden"></i><i class="fas fa-caret-right hidden md:inline text-slate-400 mr-2"></i>${item.rincian3}</div>`;

                    let badgeUsiaHtml = "";
                    if (item.usia && item.usia !== "-") {
                        badgeUsiaHtml = `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider border border-indigo-100 ml-2 hidden md:inline-flex"><i class="fas fa-clock mr-1"></i>Usia: ${item.usia}</span>`;
                    }

                    let div = document.createElement("div");
                    // Styling gabungan: Card terpisah di HP, List bergaris di Desktop
                    div.className = "bg-white md:bg-transparent border border-slate-200 md:border-none p-4 md:p-5 rounded-xl md:rounded-none shadow-sm md:shadow-none relative overflow-hidden md:flex md:items-center md:justify-between md:hover:bg-slate-50 transition-colors";
                    div.innerHTML = `
                        <div class="absolute top-3 right-3 md:hidden">
                            <span class="inline-flex items-center gap-1 px-2 py-1 rounded text-[10px] font-bold ${wBadge}"><i class="fas ${iconBadge}"></i> ${tBadge}</span>
                        </div>
                        
                        <div class="pr-20 md:pr-0 md:flex-1">
                            <div class="hidden md:flex flex-wrap items-center gap-2 mb-1">
                                <span class="bg-slate-100 text-slate-500 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">${item.tgl}</span>
                                <span class="bg-slate-100 text-slate-500 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">NIM: ${item.nim}</span>
                                ${badgeUsiaHtml}
                            </div>
                            
                            <h4 class="font-bold text-slate-800 text-base md:text-lg leading-tight md:mt-1">${item.nama}</h4>
                            <div class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-wider md:hidden">${item.nim} | ${item.tgl}</div>
                            
                            <div class="mt-3 md:mt-2 bg-slate-50 md:bg-transparent p-2.5 md:p-0 rounded-lg md:rounded-none text-xs md:text-sm text-slate-600 font-medium space-y-1 md:space-y-0 border border-slate-100 md:border-none md:flex md:flex-col md:gap-1">
                                ${rHtml}
                            </div>
                        </div>

                        <div class="hidden md:flex md:w-1/4 md:justify-end mt-3 md:mt-0">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm ${wBadge}">
                                <i class="fas ${iconBadge}"></i> ${tBadge}
                            </span>
                        </div>
                    `;
                    isiHasil.appendChild(div);
                });
            } else { document.getElementById("pesanKosong").classList.remove("hidden"); }
        }
    </script>
</body>
</html>
