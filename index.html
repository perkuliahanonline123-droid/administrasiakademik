<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#064e3b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sistem Kampus | Layanan Administrasi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { 950: '#022c22', 900: '#064e3b', 800: '#065f46', 700: '#047857', 600: '#059669', 500: '#10b981', 100: '#d1fae5', 50: '#f0fdf4' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F1F5F9; -webkit-tap-highlight-color: transparent; }
        .bg-mesh { background-color: #064e3b; background-image: radial-gradient(at 0% 0%, #065f46 0px, transparent 50%), radial-gradient(at 100% 100%, #047857 0px, transparent 50%); }
        html { scroll-behavior: smooth; }
        /* Animasi masuk */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 font-sans antialiased pb-24">

    <header class="bg-mesh text-white px-5 pt-10 pb-16 rounded-b-[2rem] shadow-lg relative overflow-hidden">
        <div class="absolute top-0 right-0 w-48 h-48 bg-white/5 rounded-full blur-2xl -mr-10 -mt-10"></div>
        <div class="relative z-10 flex flex-col gap-1">
            <span class="text-[10px] font-bold tracking-widest text-brand-100 uppercase bg-white/10 self-start px-3 py-1 rounded-full border border-white/20 mb-2">Portal Terpadu</span>
            <h1 class="font-serif text-3xl font-bold leading-tight">Layanan Administrasi</h1>
            <p class="text-brand-100/90 text-sm mt-1">Akses cepat form permohonan Anda.</p>
        </div>
    </header>

    <main class="px-4 -mt-8 relative z-10 space-y-5">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <div class="flex items-center gap-3 mb-4 pb-3 border-b border-slate-50">
                <div class="w-10 h-10 bg-brand-50 text-brand-600 rounded-xl flex items-center justify-center"><i class="fas fa-concierge-bell text-lg"></i></div>
                <div>
                    <h2 class="font-extrabold text-lg text-slate-800 leading-none">Daftar Layanan</h2>
                    <p class="text-xs font-medium text-slate-500 mt-1">Pilih untuk mengisi form</p>
                </div>
            </div>

            <div id="loadingLayanan" class="text-center py-6">
                <i class="fas fa-circle-notch fa-spin text-2xl text-brand-500 mb-2"></i>
                <p class="text-slate-500 text-xs">Memuat layanan...</p>
            </div>

            <div id="gridLayanan" class="hidden flex flex-col gap-2"></div>
        </div>

        <div id="areaPencarian" class="hidden bg-white border border-slate-200 rounded-2xl p-5 shadow-sm scroll-mt-24">
            <h3 class="font-bold text-base text-slate-800 mb-4 flex items-center"><i class="fas fa-search text-brand-600 mr-2"></i>Cari Berkas Anda</h3>
            
            <div class="space-y-4 mb-4">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Jenis Layanan</label>
                    <select id="inputJenisLayanan" class="w-full bg-slate-50 border border-slate-200 text-slate-700 py-3 px-4 rounded-xl text-sm font-bold focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all" onchange="prosesPencarian()">
                        <option value="">-- Pilih Layanan --</option>
                        <option value="Keterangan Aktif">Keterangan Aktif</option>
                        <option value="KHS">Kartu Hasil Studi (KHS)</option>
                        <option value="SKL">Surat Keterangan Lulus (SKL)</option>
                        <option value="Bebas Tanggungan">Surat Bebas Tanggungan</option>
                        <option value="Mutasi">Mutasi (Pindah Kampus)</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Nama Mahasiswa</label>
                    <input type="text" id="inputNamaMahasiswa" placeholder="Ketik min. 3 huruf..." class="w-full bg-slate-50 border border-slate-200 text-slate-700 py-3 px-4 rounded-xl text-sm font-bold focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all" oninput="prosesPencarian()">
                </div>
            </div>

            <div id="loadingPencarian" class="hidden text-center py-6"><i class="fas fa-circle-notch fa-spin text-xl text-brand-500 mb-2"></i><p class="text-slate-500 text-xs">Mencari data...</p></div>
            
            <div id="wadahHasil" class="hidden mt-4">
                <div id="isiHasil" class="flex flex-col gap-3"></div>
                <div id="pesanKosong" class="hidden p-6 text-center bg-slate-50 rounded-xl text-slate-400 text-sm font-medium border border-slate-100">
                    <i class="fas fa-search-minus text-2xl mb-2 block text-slate-300"></i> Data tidak ditemukan.
                </div>
            </div>
        </div>
    </main>

    <div id="wadahTombolStatus" class="hidden fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-md border-t border-slate-200 z-50">
        <button onclick="bukaAreaPencarian()" class="w-full flex items-center justify-center gap-3 bg-brand-600 active:bg-brand-700 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-brand-600/30 transition-colors">
            <i class="fas fa-clipboard-check text-lg"></i>
            <span>Cek Status Pengajuan</span>
        </button>
    </div>

    <script>
        // TAUTAN WEB APP GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxHkTkVUmc0abF2SllCisDkSuTNDj691YTxi2E7427ooASQd8IESztTwspR_VuH9_blg/exec';

        window.onload = async function() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLayanan`);
                const data = await response.json();
                tampilkanDaftarLayanan(data);
            } catch (error) {
                document.getElementById("loadingLayanan").innerHTML = `<div class="p-4 text-center text-rose-500 bg-rose-50 rounded-xl text-xs font-medium border border-rose-100">Gagal terhubung ke server.<br>Silakan muat ulang halaman.</div>`;
            }
        };

        function tampilkanDaftarLayanan(data) {
            document.getElementById("loadingLayanan").classList.add("hidden");
            const grid = document.getElementById("gridLayanan");
            grid.classList.remove("hidden");
            document.getElementById("wadahTombolStatus").classList.remove("hidden");

            if (!data || data.length === 0 || data.error) return grid.innerHTML = `<div class="p-4 text-center text-slate-500 text-sm bg-slate-50 rounded-xl">Belum ada layanan tersedia.</div>`;

            data.forEach((item, index) => {
                const a = document.createElement("a");
                a.href = item.link; a.target = "_blank";
                // Style list mobile: Memanjang dengan chevron di kanan
                a.className = `animate-fade-in flex items-center justify-between p-3.5 bg-slate-50 hover:bg-brand-50 active:bg-brand-100 border border-slate-100 rounded-xl transition-colors`;
                a.style.animationDelay = `${index * 0.1}s`;
                a.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-brand-600 shadow-sm border border-slate-100"><i class="fas fa-file-alt"></i></div>
                        <span class="font-bold text-sm text-slate-700 leading-tight">${item.nama}</span>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300 text-xs"></i>
                `;
                grid.appendChild(a);
            });
        }

        function bukaAreaPencarian() {
            const area = document.getElementById("areaPencarian");
            area.classList.remove("hidden"); 
            area.classList.add("animate-fade-in");
            // Scroll sedikit di atas area agar terlihat jelas di HP
            setTimeout(() => { area.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }

        let timerKetik;
        function prosesPencarian() {
            clearTimeout(timerKetik);
            let jenis = document.getElementById("inputJenisLayanan").value;
            let nama = document.getElementById("inputNamaMahasiswa").value.trim();
            
            if (jenis !== "" && nama.length >= 3) {
                document.getElementById("loadingPencarian").classList.remove("hidden");
                document.getElementById("wadahHasil").classList.add("hidden");
                timerKetik = setTimeout(async () => {
                    try {
                        const response = await fetch(`${SCRIPT_URL}?action=cariStatus&jenis=${encodeURIComponent(jenis)}&nama=${encodeURIComponent(nama)}`);
                        const data = await response.json();
                        tampilkanHasilPencarian(data);
                    } catch (error) { 
                        document.getElementById("loadingPencarian").classList.add("hidden"); 
                    }
                }, 600);
            } else {
                document.getElementById("loadingPencarian").classList.add("hidden");
                document.getElementById("wadahHasil").classList.add("hidden");
            }
        }

        function tampilkanHasilPencarian(data) {
            document.getElementById("loadingPencarian").classList.add("hidden");
            let wadahHasil = document.getElementById("wadahHasil");
            let isiHasil = document.getElementById("isiHasil");
            wadahHasil.classList.remove("hidden"); isiHasil.innerHTML = "";

            if (data && !data.error && data.length > 0) {
                document.getElementById("pesanKosong").classList.add("hidden");
                data.forEach(item => {
                    let r1 = item.rincian1 || "", r2 = item.rincian2 || "", r3 = item.rincian3 || "";
                    let cekWarna = (r1 + " " + r2 + " " + r3).toLowerCase();
                    
                    let wBadge = cekWarna.includes('ditolak') ? 'bg-rose-100 text-rose-700' : (cekWarna.includes('proses') || cekWarna.includes('belum') ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700');
                    let tBadge = cekWarna.includes('ditolak') ? 'Ditolak' : (cekWarna.includes('proses') || cekWarna.includes('belum') ? 'Diproses' : 'Selesai');
                    let iconBadge = cekWarna.includes('ditolak') ? 'fa-times' : (cekWarna.includes('proses') || cekWarna.includes('belum') ? 'fa-spinner fa-spin' : 'fa-check');

                    let rHtml = "";
                    if(item.rincian1) rHtml += `<div class="truncate"><i class="fas fa-angle-right mr-1 text-slate-300"></i>${item.rincian1}</div>`;
                    if(item.rincian2) rHtml += `<div class="truncate"><i class="fas fa-angle-right mr-1 text-slate-300"></i>${item.rincian2}</div>`;
                    if(item.rincian3) rHtml += `<div class="truncate"><i class="fas fa-angle-right mr-1 text-slate-300"></i>${item.rincian3}</div>`;

                    let div = document.createElement("div");
                    // Style Card Hasil Pencarian Mobile
                    div.className = "bg-white border border-slate-200 p-4 rounded-xl shadow-sm relative overflow-hidden";
                    div.innerHTML = `
                        <div class="absolute top-3 right-3">
                            <span class="inline-flex items-center gap-1 px-2 py-1 rounded text-[10px] font-bold ${wBadge}">
                                <i class="fas ${iconBadge}"></i> ${tBadge}
                            </span>
                        </div>
                        
                        <div class="pr-20 mb-2">
                            <h4 class="font-bold text-slate-800 text-base leading-tight">${item.nama}</h4>
                            <div class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-wider">${item.nim} | ${item.tgl}</div>
                        </div>
                        
                        <div class="mt-3 bg-slate-50 p-2.5 rounded-lg text-xs text-slate-600 font-medium space-y-1 border border-slate-100">
                            ${rHtml}
                        </div>
                    `;
                    isiHasil.appendChild(div);
                });
            } else { document.getElementById("pesanKosong").classList.remove("hidden"); }
        }
    </script>
</body>
</html>
