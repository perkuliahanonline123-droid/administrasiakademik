<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kampus</title>
    <style>
        /* Menghilangkan margin dan padding bawaan browser agar iframe bisa memenuhi layar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah scroll ganda dari body */
            background-color: #ffffff;
        }

        /* Mengatur iframe agar berukuran penuh tanpa batas (border) */
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Memuat link Google Apps Script -->
    <iframe src="https://script.google.com/macros/s/AKfycbyxHkTkVUmc0abF2SllCisDkSuTNDj691YTxi2E7427ooASQd8IESztTwspR_VuH9_blg/exec" allowfullscreen></iframe>
</body>
</html>
